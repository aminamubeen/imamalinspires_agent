# .github/workflows/daily_quote.yml
# ----------------------------------
# Triggers twice daily — once at the start of the morning window,
# once at the start of the evening window (all times in UTC = IST - 5:30).
#
# Within each job, main.py sleeps a random number of minutes so the
# actual post lands at a random time inside the window.
#
# Schedule (IST → UTC):
#
#  Day        | Morning window IST  | Cron (UTC)    | Evening window IST | Cron (UTC)
#  -----------|---------------------|---------------|--------------------|------------
#  Mon–Thu    | 07:00–09:00         | 01:30 UTC     | 19:00–21:00        | 13:30 UTC
#  Friday     | 06:00–08:00         | 00:30 UTC     | 20:00–22:00        | 14:30 UTC
#  Sat–Sun    | 08:00–10:00         | 02:30 UTC     | 18:00–20:00        | 12:30 UTC
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   ANTHROPIC_API_KEY
#   R2_ACCOUNT_ID
#   R2_ACCESS_KEY_ID
#   R2_SECRET_ACCESS_KEY
#   R2_BUCKET_NAME
#   R2_PUBLIC_URL
#   IG_USER_ID
#   IG_ACCESS_TOKEN
#   TELEGRAM_BOT_TOKEN
#   TELEGRAM_CHAT_ID

name: Daily Quote Post

on:
  # ── Morning triggers ──────────────────────────────────────────────────────
  schedule:
    - cron: "30 1 * * 1-4"    # Mon–Thu  morning  (07:00 IST = 01:30 UTC)
    - cron: "30 0 * * 5"      # Friday   morning  (06:00 IST = 00:30 UTC)
    - cron: "30 2 * * 0,6"    # Sat–Sun  morning  (08:00 IST = 02:30 UTC)

  # ── Evening triggers ──────────────────────────────────────────────────────
    - cron: "30 13 * * 1-4"   # Mon–Thu  evening  (19:00 IST = 13:30 UTC)
    - cron: "30 14 * * 5"     # Friday   evening  (20:00 IST = 14:30 UTC)
    - cron: "30 12 * * 0,6"   # Sat–Sun  evening  (18:00 IST = 12:30 UTC)

  workflow_dispatch:
    inputs:
      slot:
        description: "Slot to run (morning or evening)"
        required: true
        default: "morning"
        type: choice
        options: [morning, evening]

jobs:
  post-quote:
    runs-on: ubuntu-latest
    timeout-minutes: 120    # 2 hours covers the full window + pipeline runtime

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ───────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Dependencies ───────────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Determine slot from cron schedule or manual input ──────────────
      # Morning crons fire at 00:30, 01:30, 02:30 UTC  (hour < 12)
      # Evening crons fire at 12:30, 13:30, 14:30 UTC  (hour >= 12)
      - name: Determine slot
        id: slot
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "slot=${{ github.event.inputs.slot }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +"%H")
            if [ "$HOUR" -lt "12" ]; then
              echo "slot=morning" >> $GITHUB_OUTPUT
            else
              echo "slot=evening" >> $GITHUB_OUTPUT
            fi
          fi

      # ── 5. Run pipeline ───────────────────────────────────────────────────
      - name: Run quote pipeline
        env:
          SLOT:                  ${{ steps.slot.outputs.slot }}
          ANTHROPIC_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          R2_ACCOUNT_ID:         ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:      ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY:  ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME:        ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL:         ${{ secrets.R2_PUBLIC_URL }}
          IG_USER_ID:            ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN:       ${{ secrets.IG_ACCESS_TOKEN }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      # ── 6. Commit quotes.json (marks quote as used) ───────────────────────
      - name: Commit quotes.json usage update
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add quotes.json
          git diff --staged --quiet || git commit -m "chore: mark quote as used [skip ci]"
          git push
